baseURL = "/"
author = "Example Author"
copyright = "Copyright © 2024, Example Author"
paginate = 3.0
languageCode = "en"
DefaultContentLanguage = "en"
enableInlineShortcodes = true
ignoreErrors = [
  "error-remote-getjson"
]
# No theme: the fixture omits the (64-file) Paper theme, so Hugo serves with
# default rendering. That is enough for the preview lifecycle + e2e (we assert
# reachability and the agent's on-disk write, not rendered HTML).
title = "Example Site"

[params]
github = "example-org"

[markup]

  [markup.goldmark]

    [markup.goldmark.renderer]
    unsafe = true

[menu]

  [[menu.main]]
  identifier = "about"
  name = "About"
  url = "/post/about-example/"
  weight = 10.0

[taxonomies]
category = "categories"
tag = "tags"
series = "series"
